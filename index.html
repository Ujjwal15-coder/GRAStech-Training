<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBD NIIT Institute</title>
  <style>
    /* ===== Root & Global ===== */
    :root {
      --primary: #00ffe5;
      --secondary: #ff00c8;
      --bg-dark: #0a0a0a;
      --bg-light: #f5f5f5;
      --text-dark: #eaeaea;
      --text-light: #222;
      --card-dark: #141414;
      --card-light: #fff;
    }

    * {margin:0; padding:0; box-sizing:border-box;}

    body {
      font-family: "Poppins", sans-serif;
      background: var(--bg-light);
      color: var(--text-light);
      transition: background 0.5s, color 0.5s;
      overflow-x: hidden;
    }

    body.dark {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    
    header {
      text-align: center;
      padding: 4rem 1rem;
      background: linear-gradient(135deg, #111, #222);
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary);
      position: relative;
      overflow: hidden;
    }

    header h1 {
      font-size: 3.5rem;
      animation: glowPulse 2s infinite alternate;
    }

    header p {
      color: #fff;
      margin-top: 1rem;
      font-size: 1.2rem;
      text-shadow: 0 0 5px var(--secondary);
      animation: fadeIn 3s ease forwards;
      opacity: 0;
    }

    /* Dark mode toggle */
    .toggle-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--secondary);
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 0 10px var(--secondary), 0 0 20px var(--secondary);
    }
    .toggle-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px var(--primary), 0 0 40px var(--secondary);
    }

    /* ===== Navigation ===== */
    nav {
      background: #111;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 0 20px rgba(0,255,229,0.3);
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      padding: 0.8rem;
    }

    nav ul li {
      margin: 0 1.5rem;
      position: relative;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      letter-spacing: 1px;
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary);
    }

    /* ===== Sections ===== */
    section {
      padding: 4rem 2rem;
      text-align: center;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1s, transform 1s;
    }

    section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      font-size: 2.2rem;
      margin-bottom: 1.5rem;
      color: var(--secondary);
      text-shadow: 0 0 10px var(--secondary);
    }

    /* ===== Courses Grid ===== */
    .courses {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
    }

    .course {
      background: var(--card-light);
      color: var(--text-light);
      padding: 2rem;
      border-radius: 12px;
      width: 280px;
      transition: transform 0.4s, box-shadow 0.4s;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .course:hover {
      transform: translateY(-15px) scale(1.05);
      box-shadow: 0 0 20px var(--primary), 0 0 40px var(--secondary);
    }

    body.dark .course {
      background: var(--card-dark);
      color: var(--text-dark);
    }

    /* ===== Gallery ===== */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
    }

    .gallery img {
      width: 300px;
      border-radius: 12px;
      transition: transform 0.4s, filter 0.4s;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .gallery img:hover {
      transform: scale(1.08) rotate(2deg);
      filter: brightness(1.2);
      box-shadow: 0 0 25px var(--primary), 0 0 50px var(--secondary);
    }

    /* ===== Footer ===== */
    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 1.5rem;
      margin-top: 3rem;
      text-shadow: 0 0 5px var(--primary);
    }

    /* ===== Animations ===== */
    @keyframes glowPulse {
      from {text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary);}
      to {text-shadow: 0 0 20px var(--primary), 0 0 40px var(--secondary);}
    }

    @keyframes fadeIn {
      to {opacity: 1;}
    }
  </style>
</head>
<body>

  <section id="gallery">

      <img src="https://bbdniit.ac.in/wp-content/uploads/2019/07/bbdniit-1024x546.jpg" alt="Institute">

  <script>
    // Dark Mode Toggle
    function toggleDarkMode() {
      document.body.classList.toggle("dark");
      const btn = document.querySelector(".toggle-btn");
      if (document.body.classList.contains("dark")) {
        btn.textContent = "☀️ Light";
      } else {
        btn.textContent = "🌙 Dark";
      }
    }

    // Scroll reveal effect
    const sections = document.querySelectorAll("section");
    const revealOnScroll = () => {
      const triggerBottom = window.innerHeight * 0.8;
      sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if (top < triggerBottom) {
          sec.classList.add("visible");
        }
      });
    };
    window.addEventListener("scroll", revealOnScroll);
    window.addEventListener("load", revealOnScroll);
  </script>

    <button id="firstbtn">First Button</button>

        let firstbtn = document.getElementById("firstbtn")

        firstbtn.onclick = function () {
            alert("you clicked first button")
        }
        seconbtn.onclick = function () {
            firstbtn.onclick = function () {
                // first button now does nothing
            }
            alert("you clicked second button");
        }
    </script>
